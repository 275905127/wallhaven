name: Wallhaven
options:
  bundleIdPrefix: com.wallhaven
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    INFOPLIST_FILE: Resources/Info.plist

targets:
  Wallhaven:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wallhaven.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []

