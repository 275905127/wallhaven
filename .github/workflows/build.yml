name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build archive (no signing)
        run: |
          xcodebuild archive \
            -project Wallhaven.xcodeproj \
            -scheme Wallhaven \
            -configuration Release \
            -archivePath ./build/Wallhaven.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R ./build/Wallhaven.xcarchive/Products/Applications/Wallhaven.app ./Payload/
          zip -r -y Wallhaven-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wallhaven-unsigned.ipa
          path: Wallhaven-unsigned.ipa
          retention-days: 7

