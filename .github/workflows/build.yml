name: Build Unsigned IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcodes
        run: ls -d /Applications/Xcode*.app 2>/dev/null || echo "no xcodes found"

      - name: Use latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run unit tests
        run: |
          DESTINATION=$(xcodebuild -showdestinations -project Wallhaven.xcodeproj -scheme Wallhaven 2>/dev/null | awk -F 'id:' '/platform:iOS Simulator/ && /name:iPhone/ { split($2, parts, ","); gsub(/^[ \t]+|[ \t]+$/, "", parts[1]); print parts[1]; exit }')
          echo "Testing on simulator id: $DESTINATION"
          xcodebuild test \
            -project Wallhaven.xcodeproj \
            -scheme Wallhaven \
            -destination "platform=iOS Simulator,id=$DESTINATION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build archive (no signing)
        run: |
          SDK_VERSION=$(xcrun --sdk iphoneos --show-sdk-version)
          echo "Building with iOS SDK $SDK_VERSION"
          xcodebuild archive \
            -project Wallhaven.xcodeproj \
            -scheme Wallhaven \
            -configuration Release \
            -archivePath ./build/Wallhaven.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R ./build/Wallhaven.xcarchive/Products/Applications/Wallhaven.app ./Payload/
          zip -r -y Wallhaven-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wallhaven-unsigned.ipa
          path: Wallhaven-unsigned.ipa
          retention-days: 7
